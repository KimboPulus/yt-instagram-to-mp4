name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: npm run package:win
            artifact: windows
          - os: ubuntu-24.04
            command: npm run package:linux
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build -w @clipforge/shared
      - run: npm test
      - run: npm run typecheck
      - run: ${{ matrix.command }}

      - uses: actions/upload-artifact@v4
        with:
          name: clipforge-${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
          generate_release_notes: true
